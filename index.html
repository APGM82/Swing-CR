<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VII Festival de Swing - Ciudad Real</title>
    <meta name="description" content="Registro de actividades y clases para el VII Festival de Swing de Ciudad Real">
    <meta name="keywords" content="swing, festival, ciudad real, baile, clases, eventos">
  </head>
  <body>
    <div id="app">
      <div class="container">
        <header>
          <h1>Festival de Swing - Ciudad Real</h1>
        </header>
        
        <main>
          <section class="form-section">
            <h2>Registrar Actividad</h2>
            <form id="event-form">
              <input type="text" id="event-name" placeholder="Nombre del evento" required>
              <input type="date" id="event-date" required>
              <input type="time" id="event-time" required>
              <input type="text" id="event-location" placeholder="Ubicación" required>
              <button type="submit">Agregar</button>
            </form>
          </section>
          
          <section class="program-section">
            <h2>Programa del Festival</h2>
            <div id="events-list"></div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
