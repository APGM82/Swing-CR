<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIII Festival de Swing - Ciudad Real</title>
    <meta name="description" content="Registro de actividades y clases para el VIII Festival de Swing de Ciudad Real">
    <meta name="keywords" content="swing, festival, ciudad real, baile, clases, eventos">
  </head>
  <body>
    <div id="app">
      <div class="container">
        <header>
          <h1>VIII Festival de Swing - Ciudad Real</h1>
        </header>
        
        <main>
          <section class="seccion-formulario">
            <h2>Registrar Actividad</h2>
            <form id="formulario-evento">
              <input type="text" id="nombre-evento" placeholder="Nombre del evento" required>
              <select id="categoria-evento" required>
                <option value="">Selecciona tipo</option>
                <option value="clase">Clase</option>
                <option value="evento">Evento</option>
              </select>
              
              <input type="date" id="fecha-evento" min="2025-10-24" max="2025-10-26" value="2025-10-24" required>
              <input type="time" id="hora-evento" step="3600" required>
              
              <div id="info-ubicacion">
                <select id="ubicacion-evento" required disabled>
                  <option value="">Selecciona fecha, hora y tipo primero</option>
                </select>
                <div id="mensaje-disponibilidad"></div>
              </div>
              
              <!-- Campos específicos para clases -->
              <div id="campos-clase" class="campos-condicionales" style="display: none;">
                <input type="text" id="profesores" placeholder="Profesores">
                <select id="estilo">
                  <option value="">Estilo</option>
                  <option value="Lindy Hop">Lindy Hop</option>
                  <option value="Shag">Shag</option>
                  <option value="Solo Jazz">Solo Jazz</option>
                  <option value="Balboa">Balboa</option>
                </select>
                <select id="nivel">
                  <option value="">Nivel</option>
                  <option value="Básico">Básico</option>
                  <option value="Intermedio">Intermedio</option>
                  <option value="Avanzado">Avanzado</option>
                </select>
              </div>
              
              <!-- Campos específicos para eventos -->
              <div id="campos-evento" class="campos-condicionales" style="display: none;">
                <input type="text" id="banda" placeholder="Banda (si toca en directo)">
                <input type="text" id="profesores-evento" placeholder="Profesores implicados">
                <select id="estilo-evento">
                  <option value="">Estilo</option>
                  <option value="Lindy Hop">Lindy Hop</option>
                  <option value="Shag">Shag</option>
                  <option value="Solo Jazz">Solo Jazz</option>
                  <option value="Balboa">Balboa</option>
                </select><br>
                <textarea id="descripcion" placeholder="Descripción del evento"></textarea>
              </div>
              <button type="submit">Agregar</button>
            </form>
          </section>
          
          <section class="seccion-programa">
            <h2>Programa del Festival</h2>
            <div id="lista-eventos"></div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
